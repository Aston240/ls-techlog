<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Circuits Slots — Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c12;--panel:#0d1420;--border:#1a2840;
  --accent:#00aaff;--green:#00e676;--amber:#ffab00;
  --text:#b8d4ee;--dim:#3a5570;--bright:#e4f2ff;
  --mono:'Share Tech Mono',monospace;
  --head:'Barlow Condensed',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,170,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,170,255,.025) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0;}

.page{position:relative;z-index:1;padding:24px;max-width:860px;margin:0 auto;}
.logo{font-family:var(--head);font-weight:900;font-size:28px;letter-spacing:.1em;color:var(--bright);margin-bottom:2px;}
.logo span{color:var(--accent);}
.sub{font-size:10px;color:var(--dim);letter-spacing:.15em;margin-bottom:18px;}

.wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;}

.hd{background:#0a1628;border-bottom:1px solid var(--border);
  padding:12px 18px;display:flex;align-items:center;gap:10px;}
.hdtitle{font-family:var(--head);font-size:14px;font-weight:700;letter-spacing:.2em;color:var(--dim);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
.nowt{font-size:12px;color:var(--accent);margin-left:auto;}
.tbtn{font-size:10px;color:var(--accent);background:rgba(0,170,255,.08);border:1px solid rgba(0,170,255,.25);border-radius:3px;padding:3px 10px;cursor:pointer;}
.tbtn:hover{background:rgba(0,170,255,.18);}

.lb{border-bottom:1px solid var(--border);padding:8px 18px;
  display:flex;align-items:center;gap:10px;font-size:10px;}
.lb-lbl{color:var(--dim);letter-spacing:.1em;}
.badge{font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 9px;border-radius:3px;}
.mod{background:rgba(255,171,0,.15);color:#ffab00;border:1px solid rgba(255,171,0,.3);}
.busy{background:rgba(255,112,32,.15);color:#ff7020;border:1px solid rgba(255,112,32,.3);}
.calm{background:rgba(0,230,118,.15);color:#00e676;border:1px solid rgba(0,230,118,.3);}
.light{background:rgba(170,255,0,.1);color:#aaff00;border:1px solid rgba(170,255,0,.25);}

/* table */
table{width:100%;border-collapse:collapse;table-layout:fixed;}
col.c-time{width:72px;}
col.c-lane{} /* equal share of remaining */
col.c-load{width:90px;}

th{font-size:10px;letter-spacing:.12em;padding:9px 0 9px 10px;
  text-align:left;background:#07111e;border-bottom:2px solid var(--border);}
.th-t{color:var(--dim);}
.th-1{color:var(--accent);}
.th-2{color:#aaff00;}
.th-3{color:#ffab00;}
.th-l{color:var(--dim);}

td{padding:3px 4px;border-bottom:1px solid rgba(26,40,64,.35);vertical-align:top;}

tr.re td{background:#080e1a;}
tr.ro td{background:#0a1525;}
tr.rn td{background:rgba(0,170,255,.06)!important;}
tr.rn td.ttime{border-top:2px solid var(--accent);}
tr.rp{opacity:.25;}

/* time cell */
td.ttime{
  padding:8px 6px 8px 14px;
  border-right:1px solid var(--border);
  vertical-align:middle;
}
.tc{font-size:11px;color:var(--dim);white-space:nowrap;line-height:1.2;}
.tc.now{color:var(--accent);}
.npip{display:block;font-size:8px;color:var(--accent);letter-spacing:.05em;margin-top:2px;}

/* ── BUBBLE CARD ── */
/* sits inside the td with margin, rounded corners, full height of merged cell */
.bk{
  display:flex;
  flex-direction:column;
  justify-content:center;
  margin:3px;
  padding:8px 12px;
  border-radius:8px;
  font-size:12px;font-weight:700;letter-spacing:.05em;line-height:1.3;
  /* height fills the merged rows minus margins */
  min-height:calc(100% - 6px);
}
.bk .reg{font-size:13px;}
.bk .dur{font-size:9px;opacity:.55;font-weight:400;margin-top:4px;}

/* fleet colours */
.b1{background:rgba(0,170,255,.18);border:1px solid rgba(0,170,255,.45);color:var(--accent);}
.b2{background:rgba(170,255,0,.13);border:1px solid rgba(170,255,0,.4);color:#aaff00;}
.b3{background:rgba(255,171,0,.16);border:1px solid rgba(255,171,0,.45);color:#ffab00;}
/* non-fleet */
.bx{background:rgba(42,68,100,.2);border:1px solid rgba(58,85,112,.4);color:var(--dim);}

/* empty */
.em{font-size:10px;color:rgba(58,85,112,.25);padding:8px 10px;}

/* load badge in cell */
.lc{font-size:9px;letter-spacing:.05em;padding:2px 7px;border-radius:3px;
  display:inline-block;margin:6px 6px;}

.ft{padding:12px 18px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:12px;font-size:10px;}
.sl{color:var(--accent);text-decoration:none;border:1px solid var(--border);
  border-radius:5px;padding:5px 11px;}
.sl:hover{border-color:var(--accent);}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
</style>
</head>
<body>
<div class="page">
  <div class="logo">LS <span>AIRMOTIVE</span></div>
  <div class="sub">CIRCUITS SLOTS &nbsp;·&nbsp; DUMMY DATA &nbsp;·&nbsp; NOW = 09:10 UTC</div>

  <div class="wrap">
    <div class="hd">
      <div class="dot"></div>
      <div class="hdtitle">CIRCUITS SLOTS</div>
      <div class="nowt">09:10 UTC (DEMO)</div>
      <button class="tbtn" id="tbtn" onclick="tog()">FULL DAY ↓</button>
    </div>
    <div class="lb">
      <span class="lb-lbl">TRAFFIC LOAD:</span>
      <span class="badge mod" id="lbadge">MODERATE</span>
      <span style="color:var(--dim)" id="lhint">— Possible delay</span>
    </div>

    <div style="overflow-x:auto">
    <table>
      <colgroup>
        <col class="c-time">
        <col class="c-lane">
        <col class="c-lane">
        <col class="c-lane">
        <col class="c-load">
      </colgroup>
      <thead><tr>
        <th class="th-t">UTC</th>
        <th class="th-1">CCT 1</th>
        <th class="th-2">CCT 2</th>
        <th class="th-3">ARR / APPROACH</th>
        <th class="th-l">LOAD</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
    </div>

    <div class="ft">
      <span style="color:var(--dim);letter-spacing:.08em;">VIEW FULL SHEET:</span>
      <a class="sl" href="https://docs.google.com/spreadsheets/d/1fnMYghrTIi8EdHDN6JxFrAdqqFMuRbnB4Oj8041Y5ZY/edit?gid=818960255" target="_blank">↗ Open Google Sheet</a>
    </div>
  </div>
</div>

<script>
var NOW = 9*60+10;

var SLOTS = [
  // CCT1
  {l:0, reg:'G-EGTB', s:9*60+0,   e:10*60+0,  fl:1},
  {l:0, reg:'G-TPWI', s:10*60+0,  e:10*60+15, fl:0},
  {l:0, reg:'G-FIAT', s:10*60+15, e:11*60+15, fl:1},
  {l:0, reg:'G-UFCM', s:11*60+15, e:11*60+30, fl:0},
  {l:0, reg:'G-MKAS', s:11*60+30, e:12*60+0,  fl:1},
  // CCT2
  {l:1, reg:'G-PETR', s:9*60+0,   e:10*60+0,  fl:1},
  {l:1, reg:'G-OULX', s:10*60+0,  e:10*60+30, fl:0},
  {l:1, reg:'N150PK', s:10*60+30, e:11*60+30, fl:1},
  {l:1, reg:'G-CBEL', s:11*60+30, e:11*60+45, fl:0},
  {l:1, reg:'EI-DEF', s:11*60+45, e:12*60+0,  fl:0},
  // ARR
  {l:2, reg:'G-BOTN', s:9*60+0,   e:9*60+30,  fl:1},
  {l:2, reg:'G-TPWI', s:9*60+30,  e:9*60+45,  fl:0},
  {l:2, reg:'G-OULX', s:9*60+45,  e:10*60+15, fl:0},
  {l:2, reg:'G-HRYZ', s:10*60+15, e:11*60+0,  fl:1},
  {l:2, reg:'G-CBEL', s:11*60+0,  e:11*60+15, fl:0},
  {l:2, reg:'G-SETG', s:11*60+15, e:11*60+45, fl:1},
  {l:2, reg:'G-BCGJ', s:11*60+45, e:12*60+0,  fl:1},
];

var LOAD = [
  {s:9*60,    e:9*60+45,  lv:'Moderate', cls:'mod'},
  {s:9*60+45, e:10*60+30, lv:'Busy',     cls:'busy'},
  {s:10*60+30,e:11*60+15, lv:'Moderate', cls:'mod'},
  {s:11*60+15,e:12*60,    lv:'Light',    cls:'light'},
];

var LCLS = {Moderate:'mod',Busy:'busy',Calm:'calm',Light:'light',Heavy:'busy'};
var LHINTS = {Moderate:'— Possible delay',Busy:'— Orbit likely',Calm:'— Straight in likely',Light:'— Minimal delay',Heavy:'— Expect holding'};
var LANECLS = ['b1','b2','b3'];
var fullDay = false;

function hhmm(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }

function tog(){
  fullDay=!fullDay;
  document.getElementById('tbtn').textContent = fullDay ? 'NEXT 3 HRS ↑' : 'FULL DAY ↓';
  build();
}

function build(){
  var ws = fullDay ? 6*60  : 9*60;
  var we = fullDay ? 22*60 : 12*60;

  // Pre-compute: startMap and occupied set
  var startMap = {};
  var occupied = new Set();

  for(var i=0;i<SLOTS.length;i++){
    var slot = SLOTS[i];
    var vs = Math.max(slot.s, ws);
    var ve = Math.min(slot.e, we);
    if(ve <= vs) continue;
    var span = Math.round((ve - vs) / 15);
    var key = vs + '_' + slot.l;
    startMap[key] = {slot:slot, span:span};
    for(var t=vs+15; t<ve; t+=15) occupied.add(t+'_'+slot.l);
  }

  var tb = document.getElementById('tb');
  tb.innerHTML = '';
  var ri = 0;

  for(var t=ws; t<we; t+=15){
    var isPast = (t+15) <= NOW;
    var isNow  = t <= NOW && NOW < t+15;
    var rc = isPast ? 'rp' : isNow ? 'rn' : (ri%2===0 ? 're' : 'ro');

    var tr = document.createElement('tr');
    tr.className = rc;
    if(isNow) tr.id = 'nowrow';

    // Time cell
    var tdT = document.createElement('td');
    tdT.className = 'ttime';
    var tcDiv = document.createElement('div');
    tcDiv.className = 'tc' + (isNow?' now':'');
    tcDiv.innerHTML = hhmm(t) + (isNow ? '<span class="npip">▶ NOW</span>' : '');
    tdT.appendChild(tcDiv);
    tr.appendChild(tdT);

    // Lane cells
    for(var li=0; li<3; li++){
      var key = t+'_'+li;
      if(occupied.has(key)) continue; // spanned from above — no td

      var td = document.createElement('td');

      if(startMap[key]){
        var info = startMap[key];
        td.rowSpan = info.span;
        // bubble card — no padding on td itself, margin on .bk handles the gap
        td.style.padding = '0';
        td.style.verticalAlign = 'top';

        var bk = document.createElement('div');
        bk.className = 'bk ' + (info.slot.fl ? LANECLS[li] : 'bx');
        // height: span rows * row-height (36px each) minus the 6px total margin
        bk.style.height = (info.span * 36 - 6) + 'px';
        bk.innerHTML =
          '<span class="reg">' + info.slot.reg + '</span>' +
          '<span class="dur">' + hhmm(info.slot.s) + ' → ' + hhmm(info.slot.e) + '</span>';
        td.appendChild(bk);
      } else {
        var em = document.createElement('div');
        em.className = 'em';
        em.textContent = '—';
        td.appendChild(em);
      }
      tr.appendChild(td);
    }

    // Load cell
    var tdL = document.createElement('td');
    var lp = null;
    for(var j=0;j<LOAD.length;j++){ if(t>=LOAD[j].s && t<LOAD[j].e){lp=LOAD[j];break;} }
    if(lp){
      var lspan = document.createElement('span');
      lspan.className = 'lc ' + lp.cls;
      lspan.textContent = lp.lv;
      tdL.appendChild(lspan);
    }
    tr.appendChild(tdL);

    tb.appendChild(tr);
    ri++;
  }

  requestAnimationFrame(function(){
    var nr = document.getElementById('nowrow');
    if(nr) nr.scrollIntoView({block:'center',behavior:'smooth'});
  });
}

build();
</script>
</body>
</html>
